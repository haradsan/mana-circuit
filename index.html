<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>マナサーキット — カード×ボード対戦</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>✦ マナサーキット ✦</h1>
  <div class="header-right">
    <div id="round-info"></div>
    <div id="zoom-ctrl" title="盤面を拡大／縮小（Ctrl+マウスホイールでも可）">
      <button id="zoom-out" class="btn small" title="盤面を縮小">－</button>
      <button id="zoom-label" class="btn small" title="等倍に戻す">100%</button>
      <button id="zoom-in" class="btn small" title="盤面を拡大">＋</button>
      <button id="zoom-fit" class="btn small" title="盤面全体が画面に収まる倍率に調整する">⛶ 全体</button>
    </div>
    <button id="discard-btn" class="btn small in-game-only" title="両者の捨てカードを確認する">🗑 捨札</button>
    <button id="surrender-btn" class="btn small danger hidden" title="自分の番でダイスを振る前にゲームを投了できます">🏳 投了</button>
    <button id="mute-btn" class="btn small" title="効果音のオン/オフ">🔊</button>
    <button id="bgm-btn" class="btn small" title="BGMのオン/オフ（WebAudioで自動生成）">🎵</button>
    <button id="help-btn" class="btn small">❓ 遊び方</button>
  </div>
</header>

<main>
  <div id="board-wrap">
    <div id="board-inner">
      <svg id="board" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="center-hud">
        <div id="message">ようこそ</div>
        <div id="dice">🎲</div>
        <button id="action-btn" class="btn primary hidden"></button>
      </div>
    </div>
  </div>
</main>

<!-- 固定フローティングウィンドウ: 盤面をスクロールしても常に見える。各「✕」で一時的に隠せ、右下のチップで再表示 -->
<div id="win-p0" class="hud-win"><div id="panel-0" class="panel"></div><button class="win-close" title="一時的に隠す">✕</button></div>
<div id="win-p1" class="hud-win"><div id="panel-1" class="panel"></div><button class="win-close" title="一時的に隠す">✕</button></div>
<!-- 3人目のパネル（⚔三つ巴のときだけ表示。それ以外は .unused で非表示） -->
<div id="win-p2" class="hud-win unused"><div id="panel-2" class="panel"></div><button class="win-close" title="一時的に隠す">✕</button></div>
<div id="win-log" class="hud-win"><div id="log"></div><button class="win-close" title="一時的に隠す">✕</button></div>
<div id="win-hand" class="hud-win framed">
  <div class="win-head"><span id="hand-count"></span></div>
  <!-- 手札は矢印ボタンで1枚ずつ送れる（スマホでスワイプすると戻るジェスチャーと衝突するため） -->
  <div id="hand-row">
    <button id="hand-prev" class="hand-arrow hidden" title="手札を左へ送る">◀</button>
    <div id="hand"></div>
    <button id="hand-next" class="hand-arrow hidden" title="手札を右へ送る">▶</button>
  </div>
  <button class="win-close" title="一時的に隠す">✕</button>
</div>

<!-- 隠したウィンドウを再表示するチップ -->
<div id="hud-tabs"></div>

<div id="overlay">
  <div id="dialog"></div>
</div>

<!-- バトルのカットイン演出（フルスクリーン・⏩でスキップ可）。中身は openBattleView が生成する -->
<div id="battle-cutin" class="hidden"></div>

<!-- ダイアログを一旦閉じて盤面/手札を確認しているときに表示する「選択に戻る」ボタン -->
<button id="peek-restore" class="hidden">▲ 選択ウインドウに戻る</button>

<script src="js/sfx.js"></script>
<script src="js/bgm.js"></script>
<script src="js/profile.js"></script>
<script src="js/cards.js"></script>
<script src="js/art.js"></script>
<script src="js/stages.js"></script>
<script src="js/chars.js"></script>
<script src="js/weekly.js"></script>
<script src="js/state.js"></script>
<script src="js/battle.js"></script>
<script src="js/ai.js"></script>
<script src="js/ui.js"></script>
<script src="js/collection.js"></script>
<script src="js/main.js"></script>
</body>
</html>
